<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Firebase</title>
</head>
<body>

  <h1>CRUD de Usuarios</h1>

  <input type="text" id="nombre" placeholder="Nombre">
  <input type="email" id="correo" placeholder="Correo">

  <button onclick="crearUsuario()">Guardar</button>
  <button onclick="actualizarUsuario()">Actualizar</button>
  <button onclick="limpiar()">Limpiar</button>

  <ul id="lista"></ul>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCLUbc6f6HmkAa3XEHfYeiS2g9HtVmirpU",
  authDomain: "crud-online-ca595.firebaseapp.com",
  projectId: "crud-online-ca595",
  storageBucket: "crud-online-ca595.firebasestorage.app",
  messagingSenderId: "664875061888",
  appId: "1:664875061888:web:53a76a7062c78f7f498c65"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

console.log("Firebase conectado");

let idSeleccionado = null;

function correoValido(correo) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo);
}

function crearUsuario() {
  const nombre = document.getElementById("nombre").value.trim();
  const correo = document.getElementById("correo").value.trim();

  if (nombre === "" || correo === "") {
    alert("Completa todos los campos.");
    return;
  }

  if (!correoValido(correo)) {
    alert("Ingresa un correo válido.");
    return;
  }

  db.collection("usuarios").add({
    nombre: nombre,
    correo: correo
  })
  .then(() => {
    limpiar();
    leerUsuarios();
    alert("Usuario guardado correctamente.");
  })
  .catch((error) => {
    console.error("Error al guardar:", error);
    alert("Ocurrió un error al guardar el usuario.");
  });
}

function leerUsuarios() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "<li>Cargando usuarios...</li>";

  db.collection("usuarios").get()
    .then((snapshot) => {
      lista.innerHTML = "";

      if (snapshot.empty) {
        lista.innerHTML = "<li>No hay usuarios registrados.</li>";
        return;
      }

      snapshot.forEach((doc) => {
        const data = doc.data();

        lista.innerHTML += `
          <li>
            <strong>${data.nombre}</strong> - ${data.correo}
            <button onclick="editarUsuario('${doc.id}', '${data.nombre}', '${data.correo}')">Editar</button>
            <button onclick="eliminarUsuario('${doc.id}')">Eliminar</button>
          </li>
        `;
      });
    })
    .catch((error) => {
      console.error("Error al leer usuarios:", error);
      lista.innerHTML = "<li>Error al cargar usuarios.</li>";
    });
}

function editarUsuario(id, nombre, correo) {
  document.getElementById("nombre").value = nombre;
  document.getElementById("correo").value = correo;
  idSeleccionado = id;
}

function actualizarUsuario() {
  const nombre = document.getElementById("nombre").value.trim();
  const correo = document.getElementById("correo").value.trim();

  if (idSeleccionado === null) {
    alert("Primero selecciona un usuario para editar.");
    return;
  }

  if (nombre === "" || correo === "") {
    alert("Completa todos los campos.");
    return;
  }

  if (!correoValido(correo)) {
    alert("Ingresa un correo válido.");
    return;
  }

  db.collection("usuarios").doc(idSeleccionado).update({
    nombre: nombre,
    correo: correo
  })
  .then(() => {
    limpiar();
    leerUsuarios();
    alert("Usuario actualizado correctamente.");
  })
  .catch((error) => {
    console.error("Error al actualizar:", error);
    alert("Ocurrió un error al actualizar el usuario.");
  });
}

function eliminarUsuario(id) {
  const confirmar = confirm("¿Seguro que deseas eliminar este usuario?");
  if (!confirmar) return;

  db.collection("usuarios").doc(id).delete()
    .then(() => {
      if (idSeleccionado === id) {
        limpiar();
      }
      leerUsuarios();
      alert("Usuario eliminado correctamente.");
    })
    .catch((error) => {
      console.error("Error al eliminar:", error);
      alert("Ocurrió un error al eliminar el usuario.");
    });
}


function limpiar() {
  document.getElementById("nombre").value = "";
  document.getElementById("correo").value = "";
  idSeleccionado = null;
}

leerUsuarios();
</script>
</body>
</html>
